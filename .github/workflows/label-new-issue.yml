name: Label New Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label-compatibility-report:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'compatibility-report')
    steps:
      - name: Post validation checklist comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "## Compatibility Report Received - Pending Validation",
              "",
              "Thanks for submitting! This report has been queued for review.",
              "",
              "**Maintainer validation checklist:**",
              "- [ ] Serial log shows USB device connected with correct VID:PID",
              "- [ ] Serial log shows HID descriptor parsed successfully (no fatal errors)",
              "- [ ] Serial log shows NUT server started and UPS marked online",
              "- [ ] Reported metrics match what the serial log shows",
              "- [ ] VID:PID confirmed against submission",
              "",
              "**To confirm:** Add the `confirmed` label to this issue.",
              "**To reject:** Add the `not-supported` label and close the issue.",
              "",
              "> *This comment was posted automatically. Validation is done manually by the maintainer.*"
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  label-new-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Add needs-triage label to unlabeled issues
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            const hasTemplate = labels.some(l =>
              ['compatibility-report', 'bug'].includes(l)
            );
            if (!hasTemplate) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['needs-triage']
              });
            }
