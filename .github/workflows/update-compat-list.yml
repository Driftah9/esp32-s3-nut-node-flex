name: Update Confirmed UPS List

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  update-confirmed-list:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'confirmed'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse issue and update confirmed-ups.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;
            const body = issue.body || '';

            function extractField(body, label) {
              const re = new RegExp('### ' + label + '\\s*\\n+([^\\n#]+)', 'i');
              const match = re.exec(body);
              return match ? match[1].trim() : '_unknown_';
            }

            const manufacturer = extractField(body, 'UPS Manufacturer');
            const model        = extractField(body, 'UPS Model');
            const vid_pid      = extractField(body, 'USB VID:PID');
            const firmware     = extractField(body, 'Firmware Version');
            const statusReads  = extractField(body, 'Does UPS status data appear');

            const issueNum  = issue.number;
            const issueUrl  = issue.html_url;
            const submitter = issue.user.login;
            const date      = new Date().toISOString().split('T')[0];
            const status    = statusReads.startsWith('Yes') ? 'Confirmed' : 'Partial';

            const newRow = '| ' + manufacturer + ' ' + model + ' | ' + vid_pid + ' | ' + firmware + ' | ' + status + ' | @' + submitter + ' | [#' + issueNum + '](' + issueUrl + ') | ' + date + ' |';

            const filePath = 'docs/confirmed-ups.md';
            let content = fs.readFileSync(filePath, 'utf8');

            const insertMarker = '\n## Expected';
            const tableHeader  = '| Device | VID:PID | Firmware | Status | Submitted by | Issue | Date |';

            if (content.includes(tableHeader)) {
              content = content.replace(insertMarker, '\n' + newRow + insertMarker);
            } else {
              const tableSection = '\n' + tableHeader + '\n|--------|---------|----------|--------|--------------|-------|------|\n' + newRow + '\n';
              content = content.replace(insertMarker, tableSection + insertMarker);
            }

            fs.writeFileSync(filePath, content);
            console.log('Added: ' + manufacturer + ' ' + model + ' (' + vid_pid + ')');

      - name: Commit updated confirmed-ups.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/confirmed-ups.md
          git diff --cached --quiet || git commit -m "compat: add confirmed device from issue #${{ github.event.issue.number }}"
          git push

      - name: Post confirmation comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "## Added to Confirmed List",
              "",
              "This device has been added to `docs/confirmed-ups.md`.",
              "",
              "Thank you for contributing to the compatibility list!"
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
